baseURL = "https://lab.wcloud.sh/"
languageCode = "en-us"
title = "willingham-k8s"
paginate = 10
enableRobotsTXT = true
enableEmoji = true
buildDrafts = false

[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[params]
  contentTypeName = "posts"
  showMenuItems = 5
  fullWidthTheme = false
  centerTheme = true
  autoCover = true
  showLastUpdated = true
  showReadingTime = true

[languages.en]
  languageName = "English"
  title = "willingham-k8s"

  [languages.en.params]
    subtitle = "homelab kubernetes & gpu infrastructure"
    owner = "Michael Willingham"
    keywords = "kubernetes, homelab, gpu, rdma, sr-iov, dgx-spark"
    copyright = "© 2026 Michael Willingham"
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"
    newerPosts = "Newer posts"
    olderPosts = "Older posts"
    missingContentMessage = "Page not found..."
    missingBackButtonLabel = "Back to home page"
    minuteReadingTime = "min read"
    words = "words"

    [languages.en.params.logo]
      logoText = "willingham-k8s"
      logoHomeLink = "/"

  [[languages.en.menu.main]]
    identifier = "infrastructure"
    name = "Infrastructure"
    url = "/infrastructure/"
    weight = 1

  [[languages.en.menu.main]]
    identifier = "services"
    name = "Services"
    url = "/services/"
    weight = 2

  [[languages.en.menu.main]]
    identifier = "journal"
    name = "Journal"
    url = "/posts/"
    weight = 3

  [[languages.en.menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 4

  [[languages.en.menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 5

[[module.imports]]
  path = "github.com/panr/hugo-theme-terminal/v4"
